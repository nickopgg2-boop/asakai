<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reliability Dashboard - DMS 4.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="data_engine.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: { darkbg: '#0b1120', darkcard: '#151f32', darkborder: '#1e293b' }
                } 
            } 
        };
        
        function checkAccess() {
            const userRole = localStorage.getItem('user_role');
            if (!userRole) { window.location.replace("page_login.html"); return; }
        }
        function handleLogout() {
            if (confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) { 
                localStorage.removeItem('user_role');
                window.location.replace("page_login.html"); 
            }
        }
        function hideUnauthorizedMenus() {
            const userRole = localStorage.getItem('user_role');
            if (!userRole) return;
            document.querySelectorAll('#main-nav a').forEach(link => {
                const roles = link.getAttribute('data-roles');
                if (roles && !roles.split(',').includes(userRole)) { link.style.display = 'none'; }
            });
            const currentPage = window.location.pathname.split("/").pop();
            document.querySelectorAll('#main-nav a').forEach(link => {
                if(link.getAttribute('href') === currentPage) {
                    link.className = "bg-blue-600/20 text-blue-400 border border-blue-500/50 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all flex items-center shadow-[0_0_10px_rgba(59,130,246,0.3)]";
                }
            });
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.classList.add('dark');
            checkAccess(); hideUnauthorizedMenus();
        });
    </script>
    <style>
        body { background-color: #0b1120; color: #94a3b8; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .cyber-card { background-color: #151f32; border: 1px solid #1e293b; border-radius: 1rem; }
        .period-btn {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #1e293b;
            color: #94a3b8;
            padding: 0.65rem 1rem;
            border-radius: 0.9rem;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.22s ease;
        }
        .period-btn:hover {
            color: #e2e8f0;
            border-color: rgba(59, 130, 246, 0.45);
            background: rgba(30, 41, 59, 0.8);
            transform: translateY(-1px);
        }
        .period-btn.active {
            color: #60a5fa;
            border-color: rgba(59, 130, 246, 0.65);
            background: rgba(37, 99, 235, 0.16);
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.2);
        }
        .date-filter-input {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #1e293b;
            color: #e2e8f0;
            padding: 0.62rem 0.85rem;
            border-radius: 0.9rem;
            font-size: 0.78rem;
            font-weight: 600;
            outline: none;
        }
        .date-filter-input:focus { border-color: rgba(59, 130, 246, 0.65); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12); }
        .date-filter-input::-webkit-calendar-picker-indicator { cursor: pointer; filter: invert(1); opacity: 0.8; }
        .chart-scroll { overflow-x: auto; overflow-y: hidden; }
        .chart-scroll canvas { min-width: 640px; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-prompt selection:bg-blue-500/30">

    <header class="bg-darkbg border-b border-darkborder sticky top-0 z-40 py-3" id="main-nav-bar">
        <div class="max-w-[1800px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14">
                <div class="flex items-center space-x-3 shrink-0">
                    <div class="w-10 h-10 rounded-xl bg-blue-900/30 flex items-center justify-center text-blue-400 text-xl border border-blue-500/30 shadow-[0_0_10px_rgba(59,130,246,0.2)]">
                        <i class="fa-solid fa-gauge-high"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-slate-200 tracking-wider leading-tight text-sm uppercase">DMS 4.0</h1>
                        <p class="text-[10px] text-slate-500">Reliability & Maintenance</p>
                    </div>
                </div>
                
                <div id="main-nav" class="hidden xl:flex items-center space-x-1 border border-darkborder rounded-xl p-1.5 bg-[#0f172a] shadow-inner mx-4 overflow-x-auto scrollbar-hide">
                    <a href="page_dashboard.html" data-roles="executive,technician,production" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-chart-pie mr-2"></i> Dashboard</a>
                    <a href="page_reliability_dashboard.html" data-roles="executive" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-gauge-high mr-2"></i> Reliability</a>
                    <a href="page_calendar.html" data-roles="executive,technician" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-regular fa-calendar mr-2"></i> Calendar</a>
                    <a href="page_request_form.html" data-roles="executive,technician,production" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-plus-square mr-2"></i> Request</a>
                    <a href="page_job_queue.html" data-roles="executive,technician" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-list-ul mr-2"></i> Queue</a>
                    <a href="page_status_tracking.html" data-roles="executive,production,technician" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-columns mr-2"></i> Status Board</a>
                    <a href="page_kpi_analytics.html" data-roles="executive" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-chart-line mr-2"></i> KPIs</a>
                    <a href="page_die_master.html" data-roles="executive,technician" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-database mr-2"></i> Die Master</a>
                </div>

                <div class="flex items-center space-x-2 shrink-0">
                    <button onclick="handleLogout()" class="flex items-center text-rose-400 bg-rose-500/10 border border-rose-500/30 px-4 py-2.5 rounded-xl text-xs font-semibold transition-all hover:bg-rose-500/20"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 lg:p-8 w-full max-w-[1800px] mx-auto overflow-y-auto">
        <div class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-200 flex items-center gap-2">
                    <i class="fa-solid fa-gauge-high text-blue-400"></i> Reliability Dashboard
                </h2>
                <p class="text-sm text-slate-500 mt-1">รูปแบบกราฟอ้างอิง: KPI / LINE STOP / BM / PM และแยกไลน์ผลิต LINE A-D</p>
                <p class="text-xs text-blue-400 mt-2" id="rangeText">ช่วงข้อมูล: เดือนปัจจุบัน</p>
            </div>
            <div class="flex flex-wrap items-center gap-2 bg-[#0f172a] border border-darkborder rounded-2xl p-2">
                <button type="button" class="period-btn" data-period="day" onclick="setReliabilityPeriod('day')">รายวัน</button>
                <button type="button" class="period-btn active" data-period="month" onclick="setReliabilityPeriod('month')">รายเดือน</button>
                <button type="button" class="period-btn" data-period="year" onclick="setReliabilityPeriod('year')">รายปี</button>
                <button type="button" class="period-btn" data-period="custom" onclick="setReliabilityPeriod('custom')">เลือกช่วงวันที่</button>
                <div class="w-full md:w-px md:h-8 bg-slate-700/70 mx-1"></div>
                <label class="text-[11px] text-slate-400 font-bold ml-1">เริ่ม</label>
                <input type="date" id="reliabilityStartDate" class="date-filter-input">
                <label class="text-[11px] text-slate-400 font-bold">ถึง</label>
                <input type="date" id="reliabilityEndDate" class="date-filter-input">
                <button type="button" class="period-btn" onclick="applyCustomReliabilityRange()"><i class="fa-solid fa-magnifying-glass mr-1"></i>ค้นหา</button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-8">
            <div class="cyber-card p-6 min-h-[380px]">
                <h3 class="text-center text-xl font-bold text-slate-200 uppercase tracking-wide mb-4">KPI</h3>
                <div class="h-[300px]"><canvas id="kpiPieChart"></canvas></div>
            </div>

            <div class="cyber-card p-6 min-h-[380px]">
                <h3 class="text-center text-xl font-bold text-slate-200 uppercase tracking-wide mb-4">LINE STOP</h3>
                <div class="h-[300px]"><canvas id="lineStopChart"></canvas></div>
            </div>

            <div class="cyber-card p-6 min-h-[380px]">
                <h3 class="text-center text-xl font-bold text-slate-200 uppercase tracking-wide mb-4">BM</h3>
                <div class="h-[300px] chart-scroll"><canvas id="bmPartChart"></canvas></div>
            </div>

            <div class="cyber-card p-6 min-h-[380px]">
                <h3 class="text-center text-xl font-bold text-slate-200 uppercase tracking-wide mb-4">PM</h3>
                <div class="h-[300px]"><canvas id="pmPartChart"></canvas></div>
            </div>
        </div>
    </main>

    <script>
        let kpiPieChart, lineStopChart, bmPartChart, pmPartChart;

        const PRODUCTION_LINES = ['LINE A', 'LINE B', 'LINE C', 'LINE D'];
        let currentReliabilityPeriod = 'month';

        function destroyCharts() {
            [kpiPieChart, lineStopChart, bmPartChart, pmPartChart].forEach(chart => {
                if (chart) chart.destroy();
            });
        }

        function formatDateOnly(dateObj) {
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        }

        function getPresetReliabilityRange(period) {
            const now = new Date();
            let start;
            let end;
            let label;

            if (period === 'day') {
                start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                end = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                label = 'รายวัน';
            } else if (period === 'year') {
                start = new Date(now.getFullYear(), 0, 1);
                end = new Date(now.getFullYear(), 11, 31);
                label = 'รายปี';
            } else {
                start = new Date(now.getFullYear(), now.getMonth(), 1);
                end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                label = 'รายเดือน';
            }

            return {
                startDate: formatDateOnly(start),
                endDate: formatDateOnly(end),
                label
            };
        }

        function setDateRangeInputs(startDate, endDate) {
            const startInput = document.getElementById('reliabilityStartDate');
            const endInput = document.getElementById('reliabilityEndDate');
            if (startInput) startInput.value = startDate || '';
            if (endInput) endInput.value = endDate || '';
        }

        function getCurrentReliabilityRange() {
            if (currentReliabilityPeriod === 'custom') {
                const startInput = document.getElementById('reliabilityStartDate');
                const endInput = document.getElementById('reliabilityEndDate');
                const fallback = getPresetReliabilityRange('month');
                let startDate = startInput && startInput.value ? startInput.value : fallback.startDate;
                let endDate = endInput && endInput.value ? endInput.value : startDate;

                if (startDate > endDate) {
                    const temp = startDate;
                    startDate = endDate;
                    endDate = temp;
                    setDateRangeInputs(startDate, endDate);
                }

                return { startDate, endDate, label: 'เลือกช่วงวันที่' };
            }

            return getPresetReliabilityRange(currentReliabilityPeriod);
        }

        function updateReliabilityPeriodButtons() {
            document.querySelectorAll('[data-period]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.period === currentReliabilityPeriod);
            });
        }

        function setReliabilityPeriod(period) {
            if (!['day', 'month', 'year', 'custom'].includes(period)) return;
            currentReliabilityPeriod = period;

            if (period !== 'custom') {
                const preset = getPresetReliabilityRange(period);
                setDateRangeInputs(preset.startDate, preset.endDate);
            } else {
                const startInput = document.getElementById('reliabilityStartDate');
                const endInput = document.getElementById('reliabilityEndDate');
                if (!startInput?.value || !endInput?.value) {
                    const preset = getPresetReliabilityRange('month');
                    setDateRangeInputs(preset.startDate, preset.endDate);
                }
            }

            updateReliabilityPeriodButtons();
            initCharts();
        }

        function applyCustomReliabilityRange() {
            const startInput = document.getElementById('reliabilityStartDate');
            const endInput = document.getElementById('reliabilityEndDate');
            if (!startInput?.value || !endInput?.value) {
                alert('กรุณาเลือกวันที่เริ่มต้นและวันที่สิ้นสุด');
                return;
            }
            currentReliabilityPeriod = 'custom';
            updateReliabilityPeriodButtons();
            initCharts();
        }

        function getJobDateForReliability(job) {
            if (typeof getJobDate === 'function') return getJobDate(job);
            return (job.closedAt || job.endTime || job.plannedDate || job.requestAt || '').slice(0, 10);
        }

        function getFilteredReliabilityJobs(startDate, endDate) {
            const jobs = typeof getAllJobs === 'function' ? getAllJobs() : [];
            return jobs.filter(job => {
                const dateStr = getJobDateForReliability(job);
                return typeof isDateInRange === 'function' ? isDateInRange(dateStr, startDate, endDate) : true;
            });
        }

        function getLineLabel(job) {
            const raw = String(job.productionLine || job.line || '').toUpperCase().trim();
            if (raw === 'A' || raw === 'LINE-A') return 'LINE A';
            if (raw === 'B' || raw === 'LINE-B') return 'LINE B';
            if (raw === 'C' || raw === 'LINE-C') return 'LINE C';
            if (raw === 'D' || raw === 'LINE-D') return 'LINE D';
            if (PRODUCTION_LINES.includes(raw)) return raw;
            return 'ไม่ระบุไลน์';
        }

        function isLineStopJob(job) {
            const stock = String(job.partStock || '').toLowerCase();
            const defect = String(job.defect || '').toLowerCase();
            return stock.includes('line stop') || defect.includes('line stop') || stock.startsWith('0 ') || stock === '0';
        }

        function getPartLabel(job) {
            return String(job.partNumber || job.partName || job.dieId || 'PART NUMBER').toUpperCase();
        }

        function topPartCounts(jobs, jobType, maxRows = null, minRows = 0) {
            const counter = new Map();
            jobs.filter(job => String(job.jobType || '').toUpperCase() === jobType).forEach(job => {
                const key = getPartLabel(job);
                counter.set(key, (counter.get(key) || 0) + 1);
            });

            let rows = [...counter.entries()]
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

            if (typeof maxRows === 'number' && maxRows > 0) rows = rows.slice(0, maxRows);
            while (rows.length < minRows) rows.push(['PART NUMBER', 0]);
            if (rows.length === 0) rows.push(['ไม่มีข้อมูล', 0]);
            return rows;
        }

        function setChartCanvasWidth(canvasId, itemCount) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const minWidth = Math.max(640, itemCount * 78);
            canvas.style.minWidth = `${minWidth}px`;
            canvas.style.width = `${minWidth}px`;
        }

        function barOptions() {
            const gridColor = '#334155';
            const textColor = '#cbd5e1';
            return {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 900, easing: 'easeOutQuart' },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: textColor, font: { family: 'Prompt', size: 11 }, maxRotation: 45, minRotation: 0 }
                    },
                    y: {
                        beginAtZero: true,
                        grid: { color: gridColor, drawBorder: false },
                        ticks: { color: textColor, precision: 0, font: { family: 'Prompt', size: 11 } }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { bodyFont: { family: 'Prompt' }, titleFont: { family: 'Prompt' } }
                }
            };
        }

        function initCharts() {
            const range = getCurrentReliabilityRange();
            const jobs = getFilteredReliabilityJobs(range.startDate, range.endDate);
            const closedJobs = jobs.filter(job => String(job.status || '').toLowerCase() === 'closed');
            const bmJobs = closedJobs.filter(job => String(job.jobType || '').toUpperCase() === 'BM');
            const pmJobs = closedJobs.filter(job => String(job.jobType || '').toUpperCase() === 'PM');
            const kpis = typeof fetchAndCalculateKPIs === 'function' ? fetchAndCalculateKPIs(range.startDate, range.endDate) : null;

            const rangeText = document.getElementById('rangeText');
            if (rangeText) rangeText.textContent = `ช่วงข้อมูล${range.label ? ' ' + range.label : ''}: ${range.startDate} ถึง ${range.endDate}`;

            destroyCharts();

            const mttr = kpis ? Number(kpis.overall.avgMTTR || 0) : 0;
            const mtbf = kpis ? Number(kpis.overall.avgMTBF || 0) : 0;
            const kpiPieData = (mttr + mtbf) > 0 ? [mttr, mtbf] : [0, 0];

            kpiPieChart = new Chart(document.getElementById('kpiPieChart'), {
                type: 'pie',
                data: {
                    labels: ['MTTR', 'MTBF'],
                    datasets: [{ data: kpiPieData, borderWidth: 0, backgroundColor: ['#4f7df3', '#a78bfa'] }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 900, easing: 'easeOutQuart' },
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#cbd5e1', font: { family: 'Prompt', size: 12 } } },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const total = ctx.dataset.data.reduce((s, v) => s + Number(v || 0), 0);
                                    const value = Number(ctx.raw || 0);
                                    const pct = total > 0 ? ((value / total) * 100).toFixed(1) : '0.0';
                                    return `${ctx.label}: ${value} นาที (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });

            const lineStopCounts = PRODUCTION_LINES.map(line => jobs.filter(job => getLineLabel(job) === line && isLineStopJob(job)).length);
            lineStopChart = new Chart(document.getElementById('lineStopChart'), {
                type: 'bar',
                data: {
                    labels: ['line A', 'LINE B', 'LINE C', 'LINE D'],
                    datasets: [{ label: 'Line stop', data: lineStopCounts, backgroundColor: '#4f7df3', borderRadius: 10, maxBarThickness: 70 }]
                },
                options: barOptions()
            });

            const bmRows = topPartCounts(bmJobs, 'BM', null, 0);
            setChartCanvasWidth('bmPartChart', bmRows.length);
            bmPartChart = new Chart(document.getElementById('bmPartChart'), {
                type: 'bar',
                data: {
                    labels: bmRows.map(row => row[0]),
                    datasets: [{ label: 'BM', data: bmRows.map(row => row[1]), backgroundColor: '#4f7df3', borderRadius: 10, maxBarThickness: 70 }]
                },
                options: barOptions()
            });

            const pmRows = topPartCounts(pmJobs, 'PM', 4, 4);
            pmPartChart = new Chart(document.getElementById('pmPartChart'), {
                type: 'bar',
                data: {
                    labels: pmRows.map(row => row[0]),
                    datasets: [{ label: 'PM', data: pmRows.map(row => row[1]), backgroundColor: '#4f7df3', borderRadius: 10, maxBarThickness: 70 }]
                },
                options: barOptions()
            });
        }

        window.addEventListener('DOMContentLoaded', () => { const preset = getPresetReliabilityRange(currentReliabilityPeriod); setDateRangeInputs(preset.startDate, preset.endDate); updateReliabilityPeriodButtons(); setTimeout(initCharts, 150); });
        window.addEventListener('dms_jobs_updated', () => { setTimeout(initCharts, 200); });
    </script>
    <script src="app_ui.js"></script>
</body>
</html>
