<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - DMS 4.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="data_engine.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: { darkbg: '#0b1120', darkcard: '#151f32', darkborder: '#1e293b' }
                } 
            } 
        };
        
        function checkAccess() {
            const userRole = localStorage.getItem('user_role');
            if (!userRole) { window.location.replace("page_login.html"); return; }
        }
        function handleLogout() {
            if (confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) { 
                localStorage.removeItem('user_role');
                window.location.replace("page_login.html"); 
            }
        }
        function hideUnauthorizedMenus() {
            const userRole = localStorage.getItem('user_role');
            if (!userRole) return;
            document.querySelectorAll('#main-nav a').forEach(link => {
                const roles = link.getAttribute('data-roles');
                if (roles && !roles.split(',').includes(userRole)) { link.style.display = 'none'; }
            });
            const currentPage = window.location.pathname.split("/").pop();
            document.querySelectorAll('#main-nav a').forEach(link => {
                if(link.getAttribute('href') === currentPage) {
                    link.className = "bg-blue-600/20 text-blue-400 border border-blue-500/50 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all flex items-center shadow-[0_0_10px_rgba(59,130,246,0.3)]";
                }
            });
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.classList.add('dark');
            checkAccess(); hideUnauthorizedMenus();
        });
    </script>
    <style>
        body { background-color: #0b1120; color: #94a3b8; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .cyber-card { background-color: #151f32; border: 1px solid #1e293b; border-radius: 1rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-prompt selection:bg-blue-500/30">

    <header class="bg-darkbg border-b border-darkborder sticky top-0 z-40 py-3" id="main-nav-bar">
        <div class="max-w-[1800px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14">
                <div class="flex items-center space-x-3 shrink-0">
                    <div class="w-10 h-10 rounded-xl bg-blue-900/30 flex items-center justify-center text-blue-400 text-xl border border-blue-500/30 shadow-[0_0_10px_rgba(59,130,246,0.2)]">
                        <i class="fa-regular fa-calendar"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-slate-200 tracking-wider leading-tight text-sm uppercase">DMS 4.0</h1>
                        <p class="text-[10px] text-slate-500">Maintenance Calendar</p>
                    </div>
                </div>
                
                <div id="main-nav" class="hidden xl:flex items-center space-x-1 border border-darkborder rounded-xl p-1.5 bg-[#0f172a] shadow-inner mx-4 overflow-x-auto scrollbar-hide">
                    <a href="page_dashboard.html" data-roles="executive,technician,production" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-chart-pie mr-2"></i> Dashboard</a>
                    <a href="page_reliability_dashboard.html" data-roles="executive" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-gauge-high mr-2"></i> Reliability</a>
                    <a href="page_calendar.html" data-roles="executive,technician" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-regular fa-calendar mr-2"></i> Calendar</a>
                    <a href="page_request_form.html" data-roles="executive,technician,production" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-plus-square mr-2"></i> Request</a>
                    <a href="page_job_queue.html" data-roles="executive,technician" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-list-ul mr-2"></i> Queue</a>
                    <a href="page_status_tracking.html" data-roles="executive,production,technician" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-columns mr-2"></i> Status Board</a>
                    <a href="page_kpi_analytics.html" data-roles="executive" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-chart-line mr-2"></i> KPIs</a>
                    <a href="page_die_master.html" data-roles="executive,technician" class="text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all flex items-center"><i class="fa-solid fa-database mr-2"></i> Die Master</a>
                </div>

                <div class="flex items-center space-x-2 shrink-0">
                    <button onclick="handleLogout()" class="flex items-center text-rose-400 bg-rose-500/10 border border-rose-500/30 px-4 py-2.5 rounded-xl text-xs font-semibold transition-all hover:bg-rose-500/20"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4 sm:p-6 lg:p-8 space-y-6 max-w-[1600px] mx-auto w-full">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cyber-card p-5">
            <div>
                <h2 id="monthYearDisplay" class="text-xl font-bold text-slate-200 flex items-center gap-2"></h2>
                <div class="flex items-center gap-4 text-[10px] mt-2 font-bold uppercase tracking-wider">
                    <span class="flex items-center gap-1.5 text-blue-400"><span class="w-3 h-3 bg-blue-500/20 border border-blue-500/50 rounded"></span> BM ปกติ</span>
                    <span class="flex items-center gap-1.5 text-amber-400"><span class="w-3 h-3 bg-amber-500/20 border border-amber-500/50 rounded"></span> BM ด่วน</span>
                    <span class="flex items-center gap-1.5 text-emerald-400"><span class="w-3 h-3 bg-emerald-500/20 border border-emerald-500/50 rounded"></span> PM</span>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="changeMonth(-1)" class="bg-[#0f172a] hover:bg-slate-800 text-slate-300 border border-darkborder p-2.5 rounded-xl transition-colors"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="goToToday()" class="bg-[#0f172a] hover:bg-slate-800 text-slate-300 border border-darkborder px-4 py-2.5 rounded-xl font-bold text-xs transition-colors">เดือนปัจจุบัน</button>
                <button onclick="changeMonth(1)" class="bg-[#0f172a] hover:bg-slate-800 text-slate-300 border border-darkborder p-2.5 rounded-xl transition-colors"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="cyber-card overflow-hidden">
            <div class="grid grid-cols-7 border-b border-darkborder bg-[#0f172a]/50 text-center text-xs font-bold text-slate-400 uppercase tracking-wider">
                <div class="p-4 border-r border-darkborder text-rose-500">Sun</div>
                <div class="p-4 border-r border-darkborder">Mon</div>
                <div class="p-4 border-r border-darkborder">Tue</div>
                <div class="p-4 border-r border-darkborder">Wed</div>
                <div class="p-4 border-r border-darkborder">Thu</div>
                <div class="p-4 border-r border-darkborder">Fri</div>
                <div class="p-4">Sat</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 text-sm bg-[#0f172a]"></div>
        </div>
    </main>

    <script>
        let displayDate = new Date();
        const todayDate = new Date();

        function changeMonth(step) { displayDate.setMonth(displayDate.getMonth() + step); renderCalendar(); }
        function goToToday() { displayDate = new Date(); renderCalendar(); }

        function renderCalendar() {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            
            document.getElementById('monthYearDisplay').innerHTML = `${monthNames[month]} ${year}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const jobs = typeof getAllJobs === 'function' ? getAllJobs() : [];
            
            for (let i = 0; i < firstDayIndex; i++) grid.innerHTML += `<div class="min-h-[120px] p-2 border-r border-b border-darkborder bg-[#0b1120]/50"></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = (day === todayDate.getDate() && month === todayDate.getMonth() && year === todayDate.getFullYear());
                let dayClasses = "min-h-[120px] p-2 border-r border-b border-darkborder relative transition-colors hover:bg-slate-800/30 ";
                if(isToday) dayClasses += "bg-blue-900/20 ring-1 ring-inset ring-blue-500 shadow-[inset_0_0_15px_rgba(59,130,246,0.1)]";
                
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayJobs = jobs.filter(j => j.plannedDate === dateStr || (j.requestAt && j.requestAt.startsWith(dateStr)));
                
                let badges = '';
                dayJobs.forEach(job => {
                    if(job.jobType === 'PM') {
                        badges += `<div class="mt-1.5 p-1.5 text-[10px] rounded-lg border bg-emerald-500/10 border-emerald-500/30 text-emerald-400 font-bold truncate drop-shadow-[0_0_2px_rgba(52,211,153,0.5)]">PM: ${job.dieId}</div>`;
                    } else {
                        const isUrgent = job.priority === 'ด่วน';
                        if(isUrgent) badges += `<div class="mt-1.5 p-1.5 text-[10px] rounded-lg border bg-amber-500/10 border-amber-500/30 text-amber-400 font-bold truncate drop-shadow-[0_0_2px_rgba(251,191,36,0.5)]"><i class="fa-solid fa-triangle-exclamation mr-1"></i>${job.dieId}</div>`;
                        else badges += `<div class="mt-1.5 p-1.5 text-[10px] rounded-lg border bg-blue-500/10 border-blue-500/30 text-blue-400 font-bold truncate drop-shadow-[0_0_2px_rgba(59,130,246,0.5)]">${job.dieId}</div>`;
                    }
                });

                let dayHeader = isToday ? `<span class="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold shadow-[0_0_10px_rgba(59,130,246,0.5)]">${day}</span>` : `<span class="text-slate-400 font-bold">${day}</span>`;
                grid.innerHTML += `<div class="${dayClasses}"><div>${dayHeader}</div><div class="mt-1">${badges}</div></div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', () => { setTimeout(renderCalendar, 100); });
        window.addEventListener('dms_jobs_updated', () => { setTimeout(renderCalendar, 150); });
    </script>
    <script src="app_ui.js"></script>
</body>
</html>
